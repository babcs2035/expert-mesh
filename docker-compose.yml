# Definition of two services (ollama, app) started per node.
# NODE_ID is set in each host's .env file (generated by the deploy task).
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # Communicates with app over docker compose's internal network
    # (http://app:11434), so no need to expose to LAN. Binds to 127.0.0.1
    # only to avoid exposing an unauthenticated API externally, while still
    # allowing connectivity checks from the host for debugging.
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # Ollama's default keep_alive (5m) unloads idle models from VRAM/RAM,
      # which defeats the lab's requirement to keep model weights resident
      # across experiments. -1 disables the idle unload entirely.
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped

  app:
    # Port 5000 is already used by another project (WAFL-PEFT) in this lab.
    image: localhost:5001/expert-mesh:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Used by tools/healthcheck.py etc. to identify "self" (hairpin NAT workaround)
      - NODE_ID=${NODE_ID}
    command: ["serve", "--node-id", "${NODE_ID}"]
    # Other nodes send /probe and /dispatch via the real IP from config.yaml,
    # so the port must be exposed on the LAN interface (intentionally bound
    # to all interfaces on this host for this port only).
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./results:/app/results
    restart: unless-stopped

volumes:
  ollama_data:
