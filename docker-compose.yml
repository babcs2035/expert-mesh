# 各ノードで起動する2サービス（ollama, expert-mesh）の定義．
# NODE_IDは各ホストの.env（deployタスクが配布時に生成）で指定する．
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # expert-meshサービスとはdocker composeの内部ネットワーク（http://ollama:11434）で通信するため
    # LANへ公開する必要がない．未認証のAPIをホストの外へ晒さないよう127.0.0.1限定にする
    # （デバッグ用にホストからの疎通確認だけは可能にしておく）．
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped

  expert-mesh:
    # 5000番はこのラボ環境で別プロジェクト（WAFL-PEFT）が既に使用しているため5001を使う
    image: localhost:5001/expert-mesh:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # tools/healthcheck.py等が「自分自身」を判定するために使う（hairpin NAT回避）
      - NODE_ID=${NODE_ID}
    command: ["serve", "--node-id", "${NODE_ID}"]
    # 他ノードがconfig.yaml記載の実IP経由で/probe・/dispatchを送るため，LANインター
    # フェースへの公開が必要（本ポートのみ意図的にホストの全インターフェースへ公開する）．
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  ollama_data:
