# mise タスク定義．各タスクの実体はmise-tasks/以下の実行可能スクリプト．
[tasks.setup]
description = "ローカル環境構築：uv sync／レジストリ起動／mesh-nodeイメージのbuild&push"
run = "mise-tasks/setup"

[tasks.deploy]
description = "各ノードへのデプロイ：SSHリバーストンネル確立／config配布／イメージpull／モデルpull"
run = "mise-tasks/deploy"

[tasks.start]
description = "各ノードでdocker compose up -dを実行し実験を開始する"
run = "mise-tasks/start"

[tasks.analyze]
description = "各ノードからログを回収する（Phase 0時点は簡易収集のみ．指標計算はPhase 2）"
run = "mise-tasks/analyze"

[tasks.clean]
description = "各ノードをクリーンアップする（デフォルト:コンテナのみ．'-- --full'でモデルデータ含め完全削除）"
run = "mise-tasks/clean"
