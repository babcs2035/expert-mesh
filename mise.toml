# mise task definitions. Task implementations are executable scripts in mise-tasks/.
[tasks.setup]
description = "Local setup: uv sync / registry start / mesh-node image build and push"
run = "mise-tasks/setup"

[tasks.deploy]
description = "Deploy to all nodes: SSH reverse tunnel / config distribution / image pull / model pull"
run = "mise-tasks/deploy"

[tasks.start]
description = "Start docker compose up -d on all nodes to begin the experiment"
run = "mise-tasks/start"

[tasks.analyze]
description = "Collect logs from all nodes (Phase 0: basic collection only; metrics in Phase 2)"
run = "mise-tasks/analyze"

[tasks.clean]
description = "Clean up all nodes (default: containers only; '-- --full' removes model data too)"
run = "mise-tasks/clean"
